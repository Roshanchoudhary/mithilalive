<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – मिथिला लाइव</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .login-box h2 { color: #1a1a2e; margin-bottom: 8px; font-size: 28px; }
        .login-box p { color: #666; margin-bottom: 30px; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: 0.3s; }
        .login-box input:focus { border-color: #e74c3c; outline: none; }
        .login-box button { width: 100%; padding: 14px; background: #e74c3c; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #c0392b; transform: scale(1.02); }
        .error { color: #e74c3c; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 मिथिला लाइव</h2>
        <p>Admin Panel में प्रवेश करें</p>
        <form id="loginForm">
            <input type="text" id="username" placeholder="यूज़रनेम" required autofocus>
            <input type="password" id="password" placeholder="पासवर्ड" required>
            <button type="submit">लॉगिन करें</button>
            <div id="error" class="error">❌ गलत यूज़रनेम या पासवर्ड</div>
        </form>
    </div>

    <script>
        // ⚠️ अपना यूज़रनेम और पासवर्ड यहाँ डालें
        const USERNAME = 'mithila';
        const PASSWORD = 'Mithila@2026';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === USERNAME && pass === PASSWORD) {
                // लॉगिन सफल – CMS Load करें
                localStorage.setItem('cms_auth', btoa(user + ':' + pass));
                loadCMS();
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });

        function loadCMS() {
            // CMS Script Load करें
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/decap-cms@^3.0.0/dist/decap-cms.js';
            document.head.appendChild(script);

            // CMS Configuration
            script.onload = function() {
                CMS.init({
                    config: {
                        backend: {
                            name: 'github',
                            repo: 'Roshanchoudhary/mithilalive',
                            branch: 'main',
                            auth_scope: 'repo',
                            app_id: 'Ov23liLrAMX04YS8WWB5',
                        },
                        media_folder: 'images',
                        public_folder: '/images',
                        collections: [
                            {
                                name: 'news',
                                label: 'समाचार',
                                folder: '_news',
                                create: true,
                                slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
                                fields: [
                                    { label: 'शीर्षक', name: 'title', widget: 'string' },
                                    { label: 'तिथि', name: 'date', widget: 'datetime' },
                                    { label: 'श्रेणी', name: 'category', widget: 'select', options: ['राजनीति', 'खेल', 'टेक्नोलॉजी', 'मनोरंजन', 'स्थानीय', 'अंतर्राष्ट्रीय'] },
                                    { label: 'तस्वीर', name: 'image', widget: 'image', required: false },
                                    { label: 'समाचार', name: 'body', widget: 'markdown' },
                                    { label: 'SEO Title', name: 'seo_title', widget: 'string', required: false },
                                    { label: 'SEO Description', name: 'seo_description', widget: 'text', required: false },
                                    { label: 'SEO Keywords', name: 'seo_keywords', widget: 'string', required: false },
                                    { label: 'Slug', name: 'slug', widget: 'string', required: false }
                                ]
                            }
                        ]
                    }
                });
            };
        }

        // अगर पहले से लॉगिन है तो सीधा CMS Load करें
        if (localStorage.getItem('cms_auth')) {
            document.body.innerHTML = '<div style="text-align: center; padding: 50px; font-size: 20px;">⏳ CMS लोड हो रहा है...</div>';
            loadCMS();
        }
    </script>
</body>
</html>
